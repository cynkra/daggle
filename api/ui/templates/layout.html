{{ define "layout" }}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} — daggle</title>
  <link rel="stylesheet" href="/ui/static/style.css">
  {{ if .RefreshSeconds }}<meta http-equiv="refresh" content="{{ .RefreshSeconds }}">{{ end }}
</head>
<body>
  <header class="header">
    <a href="/ui/" class="brand">daggle</a>
    <nav>
      <a href="/ui/" class="{{ if eq .Nav "dags" }}active{{ end }}">DAGs</a>
    </nav>
  </header>
  <main class="content">
    {{ template "content" . }}
  </main>
  <footer class="footer">
    daggle status dashboard — <a href="/api/v1/health">API</a>
  </footer>
</body>
</html>
{{ end }}
