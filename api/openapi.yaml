openapi: "3.0.3"
info:
  title: daggle API
  description: REST API for the daggle DAG scheduler.
  version: "0.1.0"
  license:
    name: GPL-3.0
    url: https://www.gnu.org/licenses/gpl-3.0.html

servers:
  - url: http://localhost:9090
    description: Local daggle server (default port)

paths:
  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [system]
      responses:
        "200":
          description: Server is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/dags:
    get:
      summary: List all DAGs
      operationId: listDags
      tags: [dags]
      parameters:
        - in: query
          name: tag
          schema: { type: string }
          description: Only return DAGs whose tags include this value.
        - in: query
          name: team
          schema: { type: string }
          description: Only return DAGs whose team matches this value.
        - in: query
          name: owner
          schema: { type: string }
          description: Only return DAGs whose owner matches this value.
      responses:
        "200":
          description: Array of DAG summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DAGSummary"

  /api/v1/dags/{name}:
    get:
      summary: Get DAG details
      operationId: getDag
      tags: [dags]
      parameters:
        - $ref: "#/components/parameters/dagName"
      responses:
        "200":
          description: DAG detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DAGDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/run:
    post:
      summary: Trigger a DAG run
      operationId: triggerRun
      tags: [dags]
      parameters:
        - $ref: "#/components/parameters/dagName"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriggerRequest"
      responses:
        "201":
          description: Run started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/plan:
    get:
      summary: Get execution plan with cache status
      operationId: getPlan
      tags: [dags]
      parameters:
        - $ref: "#/components/parameters/dagName"
      responses:
        "200":
          description: Array of plan entries with cache status.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanEntry"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/impact:
    get:
      summary: Get downstream consumers of a DAG
      operationId: getImpact
      tags: [dags]
      parameters:
        - $ref: "#/components/parameters/dagName"
      responses:
        "200":
          description: Downstream DAGs (via trigger.on_dag) and declared exposures.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/runs:
    get:
      summary: List runs for a DAG
      operationId: listRuns
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/dagName"
      responses:
        "200":
          description: Array of run summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RunSummary"

  /api/v1/dags/{name}/runs/compare:
    get:
      summary: Compare two runs
      operationId: compareRuns
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - name: run1
          in: query
          required: true
          schema:
            type: string
          description: First run ID.
        - name: run2
          in: query
          required: true
          schema:
            type: string
          description: Second run ID.
      responses:
        "200":
          description: Comparison result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/runs/{run_id}:
    get:
      summary: Get run details
      operationId: getRun
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
      responses:
        "200":
          description: Run detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/runs/{run_id}/cancel:
    post:
      summary: Cancel a running DAG run
      operationId: cancelRun
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
      responses:
        "200":
          description: Cancel requested.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/dags/{name}/runs/{run_id}/steps:
    get:
      summary: List steps in a run
      operationId: listSteps
      tags: [steps]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
      responses:
        "200":
          description: Array of step summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StepSummary"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/runs/{run_id}/steps/{step_id}/log:
    get:
      summary: Get step logs
      operationId: getStepLog
      tags: [steps]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
        - $ref: "#/components/parameters/stepId"
      responses:
        "200":
          description: Step stdout and stderr.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepLog"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/runs/{run_id}/steps/{step_id}/approve:
    post:
      summary: Approve a waiting step
      operationId: approveStep
      tags: [steps]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
        - $ref: "#/components/parameters/stepId"
      responses:
        "200":
          description: Step approved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/dags/{name}/runs/{run_id}/steps/{step_id}/reject:
    post:
      summary: Reject a waiting step
      operationId: rejectStep
      tags: [steps]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
        - $ref: "#/components/parameters/stepId"
      responses:
        "200":
          description: Step rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/dags/{name}/runs/{run_id}/outputs:
    get:
      summary: Get run outputs
      operationId: getOutputs
      tags: [outputs]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
      responses:
        "200":
          description: Flat array of output entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OutputEntry"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/runs/{run_id}/summaries:
    get:
      summary: Get step summaries for a run
      operationId: getSummaries
      tags: [summaries]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
      responses:
        "200":
          description: Flat array of summary entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SummaryEntry"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/runs/{run_id}/metadata:
    get:
      summary: Get step metadata for a run
      operationId: getMetadata
      tags: [metadata]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
      responses:
        "200":
          description: Flat array of metadata entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RunMetaEntry"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/runs/{run_id}/validations:
    get:
      summary: Get validation results for a run
      operationId: getValidations
      tags: [validations]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
      responses:
        "200":
          description: Flat array of validation entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ValidationEntry"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/runs/{run_id}/artifacts:
    get:
      summary: List artifacts for a run
      operationId: getArtifacts
      tags: [artifacts]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
      responses:
        "200":
          description: Flat array of artifact entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArtifactEntry"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/runs/{run_id}/stream:
    get:
      summary: Stream run events via Server-Sent Events
      operationId: streamRun
      tags: [runs]
      description: |
        Tails events.jsonl and pushes each new event as an SSE `data:` frame.
        Sends `event: end` when run_completed or run_failed is observed, or
        `event: timeout` after 30 minutes of idle.
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
        - in: query
          name: from
          schema:
            type: string
            enum: [start, end]
            default: start
          description: "`start` replays all existing events before tailing; `end` skips them."
      responses:
        "200":
          description: Server-Sent Events stream.
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/dags/{name}/runs/{run_id}/annotations:
    get:
      summary: List annotations for a run
      operationId: listAnnotations
      tags: [annotations]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
      responses:
        "200":
          description: Array of annotations in write order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnnotationEntry"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Add an annotation to a run
      operationId: addAnnotation
      tags: [annotations]
      parameters:
        - $ref: "#/components/parameters/dagName"
        - $ref: "#/components/parameters/runId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnotationRequest"
      responses:
        "201":
          description: Annotation recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnotationEntry"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects:
    get:
      summary: List registered projects
      operationId: listProjects
      tags: [projects]
      responses:
        "200":
          description: Array of project summaries. First entry is always "(global)".
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectSummary"
    post:
      summary: Register a project
      operationId: registerProject
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Project registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/projects/{name}:
    delete:
      summary: Unregister a project
      operationId: unregisterProject
      tags: [projects]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Project name.
      responses:
        "200":
          description: Project unregistered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnregisterResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/runs/cleanup:
    post:
      summary: Clean up old runs
      operationId: cleanupRuns
      tags: [maintenance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CleanupRequest"
      responses:
        "200":
          description: Cleanup complete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  parameters:
    dagName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: DAG name.
    runId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
      description: Run ID (UUID) or the literal string "latest".
    stepId:
      name: step_id
      in: path
      required: true
      schema:
        type: string
      description: Step ID.

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict with current state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    PlanEntry:
      type: object
      required: [step_id, status]
      properties:
        step_id:
          type: string
        status:
          type: string
          enum: [cached, outdated, no-cache]
        reason:
          type: string
          description: Human-readable reason for the status.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthResponse:
      type: object
      required: [status, version, uptime_seconds, projects, dags]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: "0.1.11"
        uptime_seconds:
          type: number
          format: double
        projects:
          type: integer
          description: Number of registered projects
        dags:
          type: integer
          description: Total number of DAGs across all sources
        scheduler:
          type: object
          description: Scheduler state (present when scheduler is running)
          properties:
            registered_dags:
              type: integer
            active_runs:
              type: integer
            max_concurrent:
              type: integer
            trigger_counts:
              type: object
              additionalProperties:
                type: integer
        last_run:
          type: object
          description: Most recent run across all DAGs
          properties:
            dag_name:
              type: string
            run_id:
              type: string
            status:
              type: string
            started:
              type: string
              format: date-time

    DAGSummary:
      type: object
      required: [name, steps]
      properties:
        name:
          type: string
        steps:
          type: integer
        project:
          type: string
        schedule:
          type: string
        last_status:
          type: string
        last_run:
          type: string
          format: date-time
        owner:
          type: string
        team:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string

    DAGDetail:
      type: object
      required: [name, steps, step_ids]
      properties:
        name:
          type: string
        steps:
          type: integer
        step_ids:
          type: array
          items:
            type: string
        schedule:
          type: string
        workdir:
          type: string
        r_version:
          type: string
        last_status:
          type: string
        last_run_id:
          type: string
        last_run:
          type: string
          format: date-time
        owner:
          type: string
        team:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        exposures:
          type: array
          items:
            $ref: "#/components/schemas/ExposureEntry"

    TriggerRequest:
      type: object
      properties:
        params:
          type: object
          additionalProperties:
            type: string

    TriggerResponse:
      type: object
      required: [run_id, status]
      properties:
        run_id:
          type: string
        status:
          type: string
          example: started

    RunSummary:
      type: object
      required: [run_id, started, status]
      properties:
        run_id:
          type: string
        started:
          type: string
          format: date-time
        status:
          type: string
        duration_seconds:
          type: number
          format: double
        dag_hash:
          type: string
          description: First 12 characters of the DAG file hash.

    RunDetail:
      type: object
      required: [run_id, dag_name, status, started, steps]
      properties:
        run_id:
          type: string
        dag_name:
          type: string
        status:
          type: string
        started:
          type: string
          format: date-time
        ended:
          type: string
          format: date-time
        duration_seconds:
          type: number
          format: double
        dag_hash:
          type: string
        r_version:
          type: string
        platform:
          type: string
        params:
          type: object
          additionalProperties:
            type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/StepSummary"

    StepSummary:
      type: object
      required: [step_id, status]
      properties:
        step_id:
          type: string
        status:
          type: string
          enum:
            - running
            - completed
            - failed
            - retrying
            - waiting
            - approved
            - rejected
            - skipped
            - cached
        duration_seconds:
          type: number
          format: double
        attempts:
          type: integer
        error:
          type: string
        message:
          type: string
          description: Approval message.
        cached:
          type: boolean
          description: Whether the step was served from cache.
        cache_key:
          type: string
          description: Cache key used for the cached result.
        peak_rss_kb:
          type: integer
          format: int64
          description: Peak resident-set-size in KB for the step's process tree.
        user_cpu_sec:
          type: number
          format: double
          description: User CPU time in seconds.
        sys_cpu_sec:
          type: number
          format: double
          description: System CPU time in seconds.

    StepLog:
      type: object
      required: [step_id, stdout, stderr]
      properties:
        step_id:
          type: string
        stdout:
          type: string
        stderr:
          type: string

    OutputEntry:
      type: object
      required: [step_id, key, value]
      properties:
        step_id:
          type: string
        key:
          type: string
        value:
          type: string

    SummaryEntry:
      type: object
      required: [step_id, format, content]
      properties:
        step_id:
          type: string
        format:
          type: string
          description: Content format (e.g. "markdown").
        content:
          type: string
          description: Summary content.

    RunMetaEntry:
      type: object
      required: [step_id, name, type, value]
      properties:
        step_id:
          type: string
        name:
          type: string
          description: Metadata entry name.
        type:
          type: string
          enum: [numeric, text, table, image]
          description: Metadata value type.
        value:
          type: string
          description: Metadata value (numeric as string, table as JSON array, image as file path).

    ValidationEntry:
      type: object
      required: [step_id, name, status, message]
      properties:
        step_id:
          type: string
        name:
          type: string
          description: Validation check name.
        status:
          type: string
          enum: [pass, warn, fail]
          description: Validation result status.
        message:
          type: string
          description: Human-readable validation message.

    ArtifactEntry:
      type: object
      required: [step_id, name, path, abs_path, hash, size]
      properties:
        step_id:
          type: string
        name:
          type: string
          description: Artifact name declared in the step.
        path:
          type: string
          description: Path relative to workdir.
        abs_path:
          type: string
          description: Resolved absolute path.
        hash:
          type: string
          description: SHA-256 hash of the file.
        size:
          type: integer
          format: int64
          description: File size in bytes.
        format:
          type: string
          description: File format hint (e.g. parquet, rds, csv, png).

    ExposureEntry:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [shiny, quarto, dashboard, report, other]
        url:
          type: string
        description:
          type: string

    DownstreamDAGInfo:
      type: object
      required: [name]
      properties:
        name:
          type: string
        project:
          type: string
        trigger_on_status:
          type: string
          enum: [completed, failed, any]

    ImpactResponse:
      type: object
      required: [name, downstream, exposures]
      properties:
        name:
          type: string
        downstream:
          type: array
          items:
            $ref: "#/components/schemas/DownstreamDAGInfo"
        exposures:
          type: array
          items:
            $ref: "#/components/schemas/ExposureEntry"

    AnnotationEntry:
      type: object
      required: [note, timestamp]
      properties:
        note:
          type: string
        author:
          type: string
        timestamp:
          type: string
          format: date-time

    AnnotationRequest:
      type: object
      required: [note]
      properties:
        note:
          type: string
        author:
          type: string

    ProjectSummary:
      type: object
      required: [name, path, status, dags]
      properties:
        name:
          type: string
        path:
          type: string
        status:
          type: string
          enum: [ok, missing]
        dags:
          type: integer

    RegisterRequest:
      type: object
      required: [path]
      properties:
        name:
          type: string
          description: Project name. Defaults to directory basename if omitted.
        path:
          type: string
          description: Absolute or relative path to the project root.

    RegisterResponse:
      type: object
      required: [name, path]
      properties:
        name:
          type: string
        path:
          type: string

    UnregisterResponse:
      type: object
      required: [name]
      properties:
        name:
          type: string

    CancelResponse:
      type: object
      required: [status, run_id, message]
      properties:
        status:
          type: string
          example: cancel_requested
        run_id:
          type: string
        message:
          type: string

    ApprovalResponse:
      type: object
      required: [step_id, status]
      properties:
        step_id:
          type: string
        status:
          type: string
          enum: [approved, rejected]

    CleanupRequest:
      type: object
      required: [older_than]
      properties:
        older_than:
          type: string
          description: 'Duration string, e.g. "30d", "24h", "1h30m".'
          example: "30d"

    CompareResponse:
      type: object
      required: [outputs_diff, duration_diff, meta_diff]
      properties:
        outputs_diff:
          type: array
          items:
            $ref: "#/components/schemas/OutputDiff"
        duration_diff:
          $ref: "#/components/schemas/DurationDiff"
        meta_diff:
          $ref: "#/components/schemas/MetaDiff"

    OutputDiff:
      type: object
      required: [step_id, key, value1, value2]
      properties:
        step_id:
          type: string
        key:
          type: string
        value1:
          type: string
          description: Value from run1.
        value2:
          type: string
          description: Value from run2.

    DurationDiff:
      type: object
      required: [run1_seconds, run2_seconds, diff_seconds]
      properties:
        run1_seconds:
          type: number
          format: double
        run2_seconds:
          type: number
          format: double
        diff_seconds:
          type: number
          format: double
          description: run2 - run1 in seconds.

    MetaDiff:
      type: object
      required: [dag_hash1, dag_hash2, changed]
      properties:
        dag_hash1:
          type: string
        dag_hash2:
          type: string
        changed:
          type: boolean

    CleanupResponse:
      type: object
      required: [removed, freed_bytes, freed]
      properties:
        removed:
          type: integer
        freed_bytes:
          type: integer
          format: int64
        freed:
          type: string
          description: Human-readable size, e.g. "1.5 GB".
