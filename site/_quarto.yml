project:
  type: website
  output-dir: _site

website:
  title: "daggle"
  favicon: assets/logo/daggle-hero.png
  repo-url: https://github.com/cynkra/daggle
  repo-actions: [issue]
  page-footer:
    center: "daggle is developed by [cynkra](https://cynkra.com). GPL-3.0 License."
    right: "[GitHub](https://github.com/cynkra/daggle)"

  navbar:
    background: dark
    logo: assets/logo/daggle-hero.png
    left:
      - text: "Getting Started"
        href: getting-started/install.qmd
      - text: "Writing DAGs"
        href: writing-dags/yaml-reference.qmd
      - text: "Running"
        href: running/manual.qmd
      - text: "Monitoring"
        href: monitoring/status.qmd
      - text: "API"
        href: api/index.qmd
      - text: "daggleR"
        href: https://cynkra.github.io/daggleR/
      - text: "Tutorials"
        href: tutorials/etl-pipeline.qmd
      - text: "Reference"
        href: reference/cli.qmd
    tools:
      - icon: github
        href: https://github.com/cynkra/daggle
      - icon: sun
        aria-label: "Toggle dark mode"

  sidebar:
    - title: "Getting Started"
      style: floating
      contents:
        - text: "Installation"
          href: getting-started/install.qmd
        - text: "Your First DAG"
          href: getting-started/first-dag.qmd
        - text: "Project-Local DAGs"
          href: getting-started/project-local.qmd
        - text: "Comparison with other tools"
          href: getting-started/comparison.qmd

    - title: "Writing DAGs"
      style: floating
      contents:
        - text: "YAML Reference"
          href: writing-dags/yaml-reference.qmd
        - text: "Step Types"
          href: writing-dags/step-types.qmd
        - text: "Template Variables"
          href: writing-dags/templates.qmd
        - text: "Data Passing"
          href: writing-dags/data-passing.qmd
        - text: "Parameters"
          href: writing-dags/parameters.qmd
        - text: "Lifecycle Hooks"
          href: writing-dags/hooks.qmd
        - text: "Conditional Execution"
          href: writing-dags/conditionals.qmd
        - text: "Matrix Runs"
          href: writing-dags/matrix.qmd
        - text: "Shared Defaults"
          href: writing-dags/base-yaml.qmd
        - text: "Error Handling"
          href: writing-dags/error-handling.qmd

    - title: "Running"
