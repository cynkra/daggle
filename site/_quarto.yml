format:
  html:
    theme:
      light: [cosmo, styles/light.scss]
      dark: [darkly, styles/dark.scss]
    mainfont: Inter
    monofont: JetBrains Mono
    css: styles/custom.css
    highlight-style:
      light: a11y-light
      dark: a11y-dark
    code-copy: true
    toc: true
    toc-depth: 2
    callout-appearance: simple
    mermaid:
      theme: forest
